name: Exp'Air Medical - CI/CD Pipeline
# Sprint 0 - Sécurité & Infrastructure
# Déploiement automatisé avec tests de qualité

on:
  push:
    branches: ["main", "production"]
  pull_request:
    branches: ["main", "production"]
  # Permettre l'exécution manuelle
  workflow_dispatch:

# Variables d'environnement globales
env:
  NODE_VERSION: '18.x'

jobs:
  # ================================================================
  # JOB 1 : QUALITY CHECK (Lint + Tests + Build)
  # ================================================================
  
  quality-check:
    name: 🔍 Quality & Security Checks
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout du code
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      # 2. Setup Node.js
      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      # 3. Installer les dépendances
      - name: 📦 Install dependencies
        run: npm ci
      
      # 4. Lint (Code Style)
      - name: 🎨 Run ESLint
        run: npm run lint
        continue-on-error: false
      
      # 5. TypeScript Check
      - name: 📘 TypeScript Check
        run: npx tsc --noEmit
        continue-on-error: false
      
      # 6. Tests Unitaires (si configurés)
      - name: 🧪 Run Unit Tests
        run: npm run test:unit || echo "No unit tests configured"
        continue-on-error: true
      
      # 7. Build Check (Vérifier que le build passe)
      - name: 🏗️ Build Application
        run: npm run build
        env:
          # Variables d'environnement pour le build
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      
      # 8. Upload build artifacts (pour deploy)
      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ================================================================
  # JOB 2 : SECURITY SCAN (Vulnérabilités npm)
  # ================================================================
  
  security-scan:
    name: 🔒 Security Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: 📦 Install dependencies
        run: npm ci
      
      # Audit npm pour vulnérabilités
      - name: 🛡️ npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      # Scan avec Snyk (optionnel - nécessite SNYK_TOKEN)
      - name: 🔍 Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # ================================================================
  # JOB 3 : LIGHTHOUSE PERFORMANCE (Optionnel)
  # ================================================================
  
  lighthouse:
    name: 🚀 Lighthouse Performance Audit
    runs-on: ubuntu-latest
    needs: quality-check
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: 📦 Install dependencies
        run: npm ci
      
      - name: 🏗️ Build
        run: npm run build
      
      # Lighthouse CI
      - name: 🚀 Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            http://localhost:5173
          uploadArtifacts: true
          temporaryPublicStorage: true

  # ================================================================
  # JOB 4 : DEPLOY STAGING (Branche main)
  # ================================================================
  
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [quality-check, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.expair-medical.com
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # Télécharger le build artifact
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      
      # Deploy sur Vercel (Staging)
      - name: 🚀 Deploy to Vercel Staging
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod=false'
          working-directory: ./
      
      # Notification Slack (optionnel)
      - name: 📢 Slack Notification
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: 'Staging deployment completed'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ================================================================
  # JOB 5 : DEPLOY PRODUCTION (Branche production)
  # ================================================================
  
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [quality-check, security-scan]
    if: github.ref == 'refs/heads/production' && github.event_name == 'push'
    environment:
      name: production
      url: https://expair-medical.com
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      
      # Deploy sur Vercel (Production)
      - name: 🚀 Deploy to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
      
      # Créer un Release GitHub
      - name: 📦 Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            ## 🚀 Production Deployment
            
            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}
            
            ### Changes
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
      
      # Notifier Sentry d'un nouveau release
      - name: 📊 Notify Sentry of Release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: v${{ github.run_number }}
      
      # Notification Slack Production
      - name: 📢 Slack Notification (Production)
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: |
            🚀 **PRODUCTION DEPLOYMENT**
            Status: ${{ job.status }}
            Version: v${{ github.run_number }}
            URL: https://expair-medical.com
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ================================================================
  # JOB 6 : BACKUP DATABASE (Production uniquement)
  # ================================================================
  
  backup-database:
    name: 💾 Backup Database
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/production'
    
    steps:
      - name: 💾 Trigger Supabase Backup
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/trigger_backup" \
            -d '{}'
      
      - name: 📢 Backup Notification
        run: echo "Database backup triggered successfully"

  # ================================================================
  # JOB 7 : RUN DATABASE MIGRATIONS (si nécessaire)
  # ================================================================
  
  run-migrations:
    name: 🗄️ Run Database Migrations
    runs-on: ubuntu-latest
    needs: quality-check
    if: github.ref == 'refs/heads/production' && contains(github.event.head_commit.message, '[migrate]')
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🗄️ Run Supabase Migrations
        run: |
          # Installer Supabase CLI
          npm install -g supabase
          
          # Appliquer les migrations
          supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"
      
      - name: ✅ Migrations Complete
        run: echo "Database migrations applied successfully"
